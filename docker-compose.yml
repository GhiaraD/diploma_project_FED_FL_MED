version: "3.9"

services:
  # ===== Central FL =====
  central:
    build:
      context: .
      dockerfile: ./services/central/Dockerfile
    environment:
      CENTRAL_STORAGE: /storage
      PORT: 8081  # Management API port
      USE_FLOWER: "true"
      # Flower server config
      FLOWER_SERVER_ADDRESS: 0.0.0.0:8082
      NUM_ROUNDS: 2
      MIN_CLIENTS: 2
      MIN_FIT_CLIENTS: 2
      MIN_AVAILABLE_CLIENTS: 3
      FRACTION_FIT: 0.66
      MODEL_NAME: efficientnet_b0
      NUM_CLASSES: 2
      NUM_EPOCHS: 2
      LEARNING_RATE: 0.001
      OPTIMIZER: adam
    volumes:
      - ./storage/central:/storage
    ports:
      - "8080:8080"  # Flower gRPC
      - "8081:8081"  # Management API
    command: python -m app.main  # Start management API (Flower server started separately)

  # ===== Node 1 =====
  node1-api:
    build:
      context: .
      dockerfile: ./services/node/api/Dockerfile
    environment:
      NODE_ID: node1
      STORAGE_ROOT: /storage
      CENTRAL_URL: http://central:8081
      REDIS_URL: redis://node1-redis:6379/0
      DEVICE: cuda
      TZ: ${TZ:-UTC}
    volumes:
      - ./storage/node1:/storage
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8001:8000"
    depends_on:
      - central
      - node1-redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  node1-worker:
    build:
      context: .
      dockerfile: ./services/node/worker/Dockerfile
    environment:
      NODE_ID: node1
      STORAGE_ROOT: /storage
      CENTRAL_URL: http://central:8081  # Management API
      FLOWER_SERVER: central:8080  # Flower gRPC
      REDIS_URL: redis://node1-redis:6379/0
      DEVICE: cuda
      TZ: ${TZ:-UTC}
    volumes:
      - ./storage/node1:/storage
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - node1-redis
      - node1-api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  node1-redis:
    image: redis:7
    ports:
      - "63791:6379"

  node1-ui:
    build:
      context: ./services/node/ui
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - node1-api

  # ===== Node 2 =====
  node2-api:
